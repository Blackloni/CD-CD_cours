name: CI/CD → Render

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────
  # JOB 1 : Tests (CI)
  # ─────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Lancement des tests
        run: npm test

  # ─────────────────────────────────
  # JOB 2 : Déploiement sur Render (CD)
  # ─────────────────────────────────
  deploy:
    name: 🚀 Déploiement Render
    runs-on: ubuntu-latest
    needs: test                      # Lance UNIQUEMENT si les tests passent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy vers Render
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.RENDER_SERVICE_ID }}
          api_key: ${{ secrets.RENDER_API_KEY }}
          wait_deploy: true
