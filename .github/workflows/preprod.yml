name: CI → preprod

on:
  push:
    branches: ["preprod"]
  pull_request:
    branches: ["preprod"]

jobs:
  # ─────────────────────────────────
  # JOB 1 : Lint
  # ─────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification ESLint
        run: npm run lint

  # ─────────────────────────────────
  # JOB 2 : Tests unitaires
  # ─────────────────────────────────
  test-unit:
    name: 🧪 Tests unitaires
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Tests unitaires avec couverture
        run: npm test -- --coverage

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────
  # JOB 3 : Tests d'intégration
  # (plus poussés qu'en dev)
  # ─────────────────────────────────
  test-integration:
    name: 🔗 Tests d'intégration
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Tests d'intégration
        run: npm run test:integration
        env:
          NODE_ENV: test

  # ─────────────────────────────────
  # JOB 4 : Build de vérification
  # ─────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test-integration
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Build de production
        run: npm run build --if-present

  # ─────────────────────────────────
  # JOB 5 : Déploiement sur env preprod
  # (uniquement sur push, pas sur PR)
  # ─────────────────────────────────
  deploy-preprod:
    name: 🚀 Deploy → preprod
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'   # Pas de deploy sur les PR

    steps:
      - name: Deploy vers Render (env preprod)
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.RENDER_SERVICE_ID_PREPROD }}
          api_key: ${{ secrets.RENDER_API_KEY }}
          wait_deploy: false
